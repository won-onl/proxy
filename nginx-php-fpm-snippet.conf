# FASTPANEL: при режиме PHP-FPM файл .htaccess не обрабатывается.
# Добавьте в конфигурацию Nginx для сайта won-onl.ru (через «Пользовательский конфиг»
# в карточке сайта или /data/nginx/... — зависит от сборки) ОДИН блок:

location / {
    try_files $uri $uri/ /index.php?$query_string;
}

# Блок fastcgi для *.php панель обычно уже создаёт — его не дублировать.
